<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quên mật khẩu SmartSpending</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center">
<div class="relative flex h-full min-h-screen w-full max-w-[430px] flex-col bg-white dark:bg-background-dark shadow-2xl overflow-x-hidden">
<!-- Header Navigation -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Quên mật khẩu?</h2>
</div>
<div class="flex-1 flex flex-col px-6 pt-4">
<!-- Illustration Section -->
<div class="@container mb-8">
<div class="w-full aspect-square max-h-64 bg-primary/5 dark:bg-primary/10 rounded-3xl flex items-center justify-center overflow-hidden relative">
<!-- Abstract Illustration using Gradients and Shapes -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent opacity-50"></div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-24 h-24 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/30 mb-4">
<span class="material-symbols-outlined text-5xl">lock_reset</span>
</div>
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary/40"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/10"></div>
</div>
</div>
<img alt="Security concept illustration" class="absolute inset-0 w-full h-full object-cover opacity-10 mix-blend-overlay" data-alt="Person thinking next to a secure digital key icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbtKOOTpHDYFtohX2bc3i9xkiZv4JuKMyKUJqpCwq7GGqrOY7Id4NUwFYJqV69HtLkzfPSWesbWfxowI15Bim-Z61nipT-ArFmXPpjQ7_Ep5phb3vwrsMQ4Ngah9oLoDoaJZ-SGocrulfPiFSKVJle-4aOeOz0tySK4dcbqQGXDOldxnvqP1DmXv8jG0KVj2FYuGkLNcJdXVB4iwKJL-Wce-l5uLyphq4DlvAqF_F_U047hkSuW4w3a25Rhqo6zHLLFFPKMT9FdnQ"/>
</div>
</div>
<!-- Content Section -->
<div class="mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight mb-3">
                    Quên mật khẩu?
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                    Đừng lo lắng! Hãy nhập email đã đăng ký, chúng tôi sẽ gửi mã xác thực để bạn đặt lại mật khẩu.
                </p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold ml-1">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="Nhập email của bạn" type="email" value=""/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Gửi mã xác thực</span>
<span class="material-symbols-outlined text-xl">send</span>
</button>
</div>
<!-- Footer Navigation -->
<div class="mt-auto py-8 flex justify-center">
<a class="flex items-center gap-2 text-primary font-semibold hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
<span>Quay lại Đăng nhập</span>
</a>
</div>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
