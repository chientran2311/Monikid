<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập SmartSpending</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f34",
                        "primary-dark": "#1b4d1f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1c2b1e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<!-- Mobile Container -->
<div class="w-full max-w-[400px] flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col items-center justify-center text-center space-y-4 pt-8">
<div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center shadow-sm">
<!-- Using a sprout icon to represent growth -->
<span class="material-symbols-outlined text-primary text-5xl">potted_plant</span>
</div>
<div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">SmartSpending</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Quản lý tài chính thông minh cho gia đình</p>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl shadow-lg p-6 space-y-6 w-full">
<!-- Role Selector -->
<div class="bg-background-light dark:bg-background-dark p-1 rounded-lg flex relative">
<label class="flex-1 text-center cursor-pointer relative z-10">
<input checked="" class="peer hidden" name="role" type="radio" value="student"/>
<div class="py-2 text-sm font-medium rounded-md text-slate-500 dark:text-slate-400 peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-sm transition-all duration-200">
                        Sinh viên
                    </div>
</label>
<label class="flex-1 text-center cursor-pointer relative z-10">
<input class="peer hidden" name="role" type="radio" value="parent"/>
<div class="py-2 text-sm font-medium rounded-md text-slate-500 dark:text-slate-400 peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-sm transition-all duration-200">
                        Phụ huynh
                    </div>
</label>
</div>
<!-- Form Fields -->
<form class="space-y-4" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-background-light dark:bg-background-dark text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors sm:text-sm" id="email" name="email" placeholder="nhapemail@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-background-light dark:bg-background-dark text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors sm:text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-slate-400 text-[20px] hover:text-slate-600 dark:hover:text-slate-300">visibility</span>
</div>
</div>
<div class="flex justify-end pt-1">
<a class="text-xs font-medium text-primary hover:text-primary-dark hover:underline" href="#">Quên mật khẩu?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Divider -->
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-light dark:bg-surface-dark text-slate-500">hoặc đăng nhập với</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" type="button">
<img alt="Google" class="h-5 w-5 mr-2" data-alt="Google Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPXJENyjlfwWMxt_m3obIjy9rNwW2q_uOIZBxfo2ieXNaETK3SyZTQShS6O9HSFWZBAWPEJ3C92Wm_2G3gbS0f13J3MoRqRvXKvqjf0vJjwHkaaILYGy7fA6jxz6WzEqrpuZEy8DVUpJ_WlH0Jv8JCHbYjfgiJ1BhZNUe5-VpL2_QlaS1Hk7H0mZyGezLrMtI3VrmJRVtitMlfPjz9dc3n-pC9ljUSFFxqT_Lezg7rB3kS6cBRYY5IgEUuEDnsjO-aGvjHHMRxuGY"/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" type="button">
<span class="material-symbols-outlined text-slate-900 dark:text-white text-[22px] mr-2">ios</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Apple</span>
</button>
</div>
</div>
<!-- Footer -->
<p class="text-center text-sm text-slate-600 dark:text-slate-400 pb-8">
            Chưa có tài khoản? 
            <a class="font-semibold text-primary hover:text-primary-dark hover:underline" href="#">Đăng ký ngay</a>
</p>
</div>
</body></html>
