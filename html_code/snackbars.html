<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hệ thống Thông báo - SmartSpending</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "success": "#2E7D32",
                        "error": "#D32F2F",
                        "warning": "#FFA000",
                        "info": "#1976D2",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">

<!-- Floating Snackbar Area (Demonstrating the look) -->
<div class="absolute bottom-24 left-0 right-0 px-4 space-y-3 pointer-events-none">
<!-- Success Toast -->
<div class="flex items-center gap-3 bg-success text-white p-4 rounded-lg shadow-xl animate-bounce-subtle pointer-events-auto">
<span class="material-symbols-outlined">check_circle</span>
<span class="flex-1 text-sm font-medium">Lưu giao dịch thành công</span>
<button class="material-symbols-outlined text-white/70 hover:text-white transition-colors">close</button>
</div>
<!-- Error Toast -->
<div class="flex items-center gap-3 bg-error text-white p-4 rounded-lg shadow-xl pointer-events-auto">
<span class="material-symbols-outlined">cancel</span>
<span class="flex-1 text-sm font-medium">Mật khẩu không đúng</span>
<button class="material-symbols-outlined text-white/70 hover:text-white transition-colors">close</button>
</div>
<!-- Warning Toast -->
<div class="flex items-center gap-3 bg-warning text-slate-900 p-4 rounded-lg shadow-xl pointer-events-auto">
<span class="material-symbols-outlined">report_problem</span>
<span class="flex-1 text-sm font-medium">Vui lòng kiểm tra kết nối mạng</span>
<button class="material-symbols-outlined text-slate-900/60 hover:text-slate-900 transition-colors">close</button>
</div>
<!-- Info Toast -->
<div class="flex items-center gap-3 bg-info text-white p-4 rounded-lg shadow-xl pointer-events-auto">
<div class="animate-spin-slow">
<span class="material-symbols-outlined">sync</span>
</div>
<span class="flex-1 text-sm font-medium">Đang xử lý...</span>
<button class="material-symbols-outlined text-white/70 hover:text-white transition-colors">close</button>
</div>
</div>

<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
<style>
        .font-fill {
            font-variation-settings: 'FILL' 1;
        }
        @keyframes slow-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: slow-spin 2s linear infinite;
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 2s ease-in-out infinite;
        }
    </style>
</body></html>
