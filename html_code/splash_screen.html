<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartSpending Splash Screen</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#2f7f33", "primary-dark": "#23635e", "primary-light": "#e0f2f1", "background-light": "#f6f8f6", "background-dark": "#141e15", "neutral-gray": "#64748B"}, fontFamily: {display: "Spline Sans"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 h-screen w-full overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative flex flex-col h-full w-full justify-between items-center bg-gradient-to-b from-white via-white to-primary/10 dark:from-background-dark dark:via-background-dark dark:to-primary/20">
<!-- Spacer for top content alignment -->
<div class="flex-1"></div>
<!-- Center Content: Logo & Brand -->
<div class="flex flex-col items-center justify-center z-10 animate-fade-in px-6">
<!-- Logo Container -->
<div class="relative mb-6">
<!-- Abstract "Wallet" shape background -->
<div class="w-28 h-28 bg-primary/10 rounded-3xl flex items-center justify-center transform rotate-3 shadow-sm border border-primary/20">
<!-- Sprout Icon -->
<div class="relative transform -rotate-3 text-primary">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 48;">
                            account_balance_wallet
                        </span>
<!-- Growing sprout overlay -->
<span class="material-symbols-outlined text-[42px] absolute -top-4 -right-2 text-primary drop-shadow-sm bg-white dark:bg-background-dark rounded-full p-1" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;">
                            eco
                        </span>
</div>
</div>
</div>
<!-- Brand Name -->
<h1 class="text-3xl font-extrabold tracking-tight text-primary dark:text-primary-light mb-2 text-center">
                SmartSpending
            </h1>
<!-- Tagline -->
<p class="text-neutral-gray dark:text-slate-400 text-sm sm:text-base font-medium text-center tracking-wide opacity-90">
                Quản lý thông minh, tương lai vững bền
            </p>
</div>
<!-- Spacer -->
<div class="flex-1"></div>
<!-- Bottom Loading Indicator -->
<div class="w-full max-w-[200px] flex flex-col gap-3 pb-12 sm:pb-16 px-4 z-10">
<div class="flex justify-between items-end px-1">
<span class="text-xs font-semibold text-primary/80 dark:text-primary-light/80 uppercase tracking-wider">Loading</span>
<span class="text-xs font-medium text-slate-400">30%</span>
</div>
<!-- Progress Bar -->
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-[30%] shadow-[0_0_10px_rgba(47,127,121,0.5)]"></div>
</div>
<p class="text-[10px] text-center text-slate-400 mt-2 font-medium">Phiên bản 1.0.2</p>
</div>
<!-- Decorative Background Element (Subtle) -->
<div aria-hidden="true" class="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"></div>
</main>
</body></html>
