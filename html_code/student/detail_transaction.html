<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chi tiết Giao dịch - SmartSpending</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#2f7f34", "primary-dark": "#23c223", "background-light": "#f6f8f6", "background-dark": "#141e15", "surface-light": "#ffffff", "surface-dark": "#1a2e1a", "expense-red": "#ef4444"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, boxShadow: {soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)"}}}};</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center p-4 pt-6 sticky top-0 z-10 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h2 class="text-lg font-bold leading-tight flex-1 text-center pr-10 text-slate-900 dark:text-slate-100">
                Chi tiết Giao dịch
            </h2>
</div>
<!-- Main Content Scrollable Area -->
<div class="flex-1 px-5 py-6 flex flex-col gap-6">
<!-- Hero Section: Amount & Category -->
<div class="flex flex-col items-center justify-center py-6">
<div class="size-20 rounded-full bg-primary/20 flex items-center justify-center mb-4 ring-4 ring-primary/5 dark:ring-primary/10">
<span class="text-4xl">🍜</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="text-slate-500 dark:text-slate-400 font-medium text-base">Ăn uống</span>
<h1 class="text-expense-red font-black text-4xl tracking-tight">
                        -50.000đ
                    </h1>
</div>
</div>
<!-- Details Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-soft border border-slate-100 dark:border-slate-800 flex flex-col gap-0 divide-y divide-slate-100 dark:divide-slate-800">
<!-- Date Row -->
<div class="flex items-start gap-4 py-4 first:pt-0">
<div class="size-10 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center shrink-0 text-primary-dark dark:text-primary">
<span class="material-symbols-outlined text-[20px]">calendar_today</span>
</div>
<div class="flex flex-col gap-1 pt-1">
<span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Thời gian</span>
<p class="text-base font-semibold text-slate-800 dark:text-slate-200">21/02/2024 - 12:30</p>
</div>
</div>
<!-- Payment Method Row -->
<div class="flex items-start gap-4 py-4">
<div class="size-10 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center shrink-0 text-primary-dark dark:text-primary">
<span class="material-symbols-outlined text-[20px]">account_balance_wallet</span>
</div>
<div class="flex flex-col gap-1 pt-1">
<span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Nguồn tiền</span>
<p class="text-base font-semibold text-slate-800 dark:text-slate-200">Tiền mặt</p>
</div>
</div>
<!-- Note Row -->
<div class="flex items-start gap-4 py-4 last:pb-0">
<div class="size-10 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center shrink-0 text-primary-dark dark:text-primary">
<span class="material-symbols-outlined text-[20px]">description</span>
</div>
<div class="flex flex-col gap-1 pt-1">
<span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Ghi chú</span>
<p class="text-base font-normal text-slate-800 dark:text-slate-200 leading-relaxed">
                            Ăn trưa cùng bạn đại học
                        </p>
</div>
</div>
</div>
<!-- Map Preview (Optional Visual Element for Context) -->
<div class="rounded-xl overflow-hidden h-32 w-full relative group">
<div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent z-10"></div>
<div class="absolute bottom-3 left-3 z-20 flex items-center gap-1 text-white text-xs font-medium">
<span class="material-symbols-outlined text-[16px]">location_on</span>
<span>Canteen Đại học</span>
</div>
<!-- Placeholder for map/location image -->
<div class="w-full h-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center" data-alt="Minimalist map background showing location of transaction">
<span class="material-symbols-outlined text-slate-400 text-4xl">map</span>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="mt-auto p-5 pb-8 bg-background-light dark:bg-background-dark border-t border-slate-100 dark:border-slate-800">
<div class="flex flex-col gap-3">
<button class="flex w-full items-center justify-center rounded-xl h-12 px-6 bg-primary hover:bg-primary-dark transition-colors shadow-lg shadow-primary/20 active:scale-[0.98]">
<span class="material-symbols-outlined mr-2 text-[20px] text-slate-900">edit</span>
<span class="text-slate-900 text-base font-bold">Chỉnh sửa</span>
</button>
<button class="flex w-full items-center justify-center rounded-xl h-12 px-6 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 hover:text-expense-red dark:text-slate-400 dark:hover:text-expense-red group active:scale-[0.98]">
<span class="material-symbols-outlined mr-2 text-[20px] group-hover:text-expense-red transition-colors">delete</span>
<span class="text-sm font-semibold">Xóa giao dịch</span>
</button>
</div>
</div>
</div>
</body></html>
