<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chỉnh sửa Giao dịch - SmartSpending</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#2f7f34", "primary-dark": "#2E7D32", "background-light": "#f6f8f6", "background-dark": "#141e15", "surface-light": "#ffffff", "surface-dark": "#2a2921"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        /* Custom styles to hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30 selection:text-primary-dark">
<div class="relative flex h-full min-h-screen w-full max-w-md mx-auto flex-col overflow-x-hidden shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center justify-between px-4 py-3 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm">
<button class="group flex size-10 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 active:scale-95 transition-all">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight text-slate-900 dark:text-slate-100">Chỉnh sửa Giao dịch</h2>
<div class="size-10"></div> <!-- Spacer for centering title -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col gap-6 px-5 py-2">
<!-- Amount Section -->
<div class="flex flex-col gap-2 pt-4">
<label class="text-sm font-medium text-slate-500 dark:text-slate-400 ml-1" for="amount">Số tiền</label>
<div class="relative group">
<input class="block w-full border-b-2 border-primary/30 bg-transparent px-0 py-2 text-4xl font-bold text-primary dark:text-primary focus:border-primary focus:outline-none focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 transition-colors" id="amount" type="text" value="50.000"/>
<span class="absolute right-0 top-1/2 -translate-y-1/2 text-xl font-medium text-slate-400 dark:text-slate-500 pointer-events-none">₫</span>
</div>
</div>
<!-- Segmented Control (Transaction Type) -->
<div class="flex p-1 bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-slate-200 dark:border-slate-800/50">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="transaction_type" type="radio" value="expense"/>
<div class="flex items-center justify-center py-2.5 rounded-lg text-sm font-semibold transition-all peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-sm text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">
                        Tiền chi
                    </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="transaction_type" type="radio" value="income"/>
<div class="flex items-center justify-center py-2.5 rounded-lg text-sm font-semibold transition-all peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-sm text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">
                        Tiền thu
                    </div>
</label>
</div>
<!-- Form Fields Group -->
<div class="flex flex-col gap-4">
<!-- Category Selector -->
<button class="flex items-center justify-between p-4 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-transparent hover:border-primary/30 active:scale-[0.99] transition-all group">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-12 rounded-full bg-orange-100 text-2xl shadow-inner shadow-orange-200/50">
                            🍜
                        </div>
<div class="flex flex-col items-start">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 group-hover:text-primary transition-colors">Danh mục</span>
<span class="text-base font-semibold text-slate-900 dark:text-slate-100">Ăn uống</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Date Picker -->
<button class="flex items-center justify-between p-4 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-transparent hover:border-primary/30 active:scale-[0.99] transition-all group">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-12 rounded-full bg-primary/10 text-primary dark:text-primary/90">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div class="flex flex-col items-start">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 group-hover:text-primary transition-colors">Ngày</span>
<span class="text-base font-semibold text-slate-900 dark:text-slate-100">Hôm nay, 24/05/2024</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Note Input -->
<div class="flex items-start gap-4 p-4 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<div class="flex items-center justify-center size-12 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 shrink-0 mt-0.5">
<span class="material-symbols-outlined">edit_note</span>
</div>
<div class="flex flex-col flex-1 gap-1">
<label class="text-xs font-medium text-slate-500 dark:text-slate-400" for="note">Ghi chú</label>
<textarea class="w-full bg-transparent border-none p-0 text-base font-medium text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-0 resize-none leading-relaxed" id="note" placeholder="Thêm ghi chú..." rows="2">Ăn trưa với bạn bè</textarea>
</div>
</div>
<!-- Wallet Selector -->
<button class="flex items-center justify-between p-4 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-transparent hover:border-primary/30 active:scale-[0.99] transition-all group mt-2">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-12 rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div class="flex flex-col items-start">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 group-hover:text-primary transition-colors">Ví nguồn</span>
<span class="text-base font-semibold text-slate-900 dark:text-slate-100">Ví tiền mặt</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">expand_more</span>
</button>
</div>
<!-- Spacer for bottom scroll -->
<div class="h-24"></div>
</main>
<!-- Bottom Actions -->
<div class="fixed bottom-0 left-0 right-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-8 border-t border-slate-200 dark:border-slate-800 max-w-md mx-auto">
<button class="w-full h-14 bg-primary-dark hover:bg-[#256628] text-white rounded-xl font-bold text-lg shadow-lg shadow-primary-dark/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check</span>
                Cập nhật giao dịch
            </button>
</div>
</div>
</body></html>
