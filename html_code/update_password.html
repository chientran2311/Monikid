<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đặt lại Mật khẩu mới - SmartSpending</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-4 py-4 bg-white dark:bg-slate-900/50 sticky top-0 z-10 border-b border-primary/10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Đặt lại mật khẩu</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 flex flex-col max-w-md mx-auto w-full px-6 pt-8 pb-12">
<!-- Illustration/Icon Section -->
<div class="flex justify-center mb-8">
<div class="relative">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-150 blur-xl"></div>
<div class="relative bg-primary/20 p-6 rounded-full">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'wght' 300;">lock_reset</span>
</div>
</div>
</div>
<!-- Header Text -->
<div class="mb-8">
<h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Mật khẩu mới</h2>
<p class="text-slate-500 dark:text-slate-400 text-base">
                Vui lòng nhập mật khẩu mới của bạn. Hãy chắc chắn rằng mật khẩu này đủ mạnh để bảo vệ tài chính của bạn.
            </p>
</div>
<!-- Reset Password Form -->
<div class="space-y-6">
<!-- New Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Mật khẩu mới</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">key</span>
<input class="w-full pl-12 pr-12 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-base" placeholder="••••••••" type="password" value="Password123!"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Password Strength Indicator -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
<div class="flex justify-between items-center mb-3">
<span class="text-sm font-medium text-slate-600 dark:text-slate-400">Độ bảo mật: <span class="text-primary font-bold">Mạnh</span></span>
<span class="text-xs font-bold text-primary">85%</span>
</div>
<div class="w-full h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 85%;"></div>
</div>
<p class="mt-3 text-[11px] text-slate-400 leading-relaxed uppercase tracking-wider">
                    Gợi ý: Sử dụng kết hợp chữ hoa, chữ thường, số và ký hiệu.
                </p>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Xác nhận mật khẩu mới</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">verified_user</span>
<input class="w-full pl-12 pr-12 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-base" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Footer / Action Area -->
<div class="mt-auto pt-10">
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Cập nhật mật khẩu
                <span class="material-symbols-outlined text-white">check_circle</span>
</button>
<p class="text-center mt-6 text-sm text-slate-400">
                Bạn gặp sự cố? <a class="text-primary font-semibold hover:underline" href="#">Liên hệ hỗ trợ</a>
</p>
</div>
</main>
<!-- Success Feedback Backdrop (Hidden by default, used for flow demonstration) -->

            <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6">

            <button class="w-full py-3 bg-primary text-white font-bold rounded-xl">Đăng nhập ngay</button>
        </div>
    </div>

<!-- Bottom Indicator (iOS style) -->
<div class="h-2 w-32 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-2 shrink-0"></div>
</body></html>
