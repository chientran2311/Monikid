name: monikid
description: "MoniKid - Family Fintech App for children's allowance and spending management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.0.0

  # Local Storage
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Camera
  camera: ^0.10.5+9

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # UI Components
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  lottie: ^3.1.2

  # AI
  google_generative_ai: ^0.4.7
  flutter_gemma: ^0.16.5

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0
  http: ^1.6.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  get_it: ^9.2.1
  dio: ^5.9.1
  logger: ^2.6.2
  google_fonts: ^8.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  flutter_secure_storage: ^10.0.0
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^2.6.1
  emoji_picker_flutter: ^4.3.0
  bcrypt: ^1.2.0
  lazy_load_indexed_stack: ^1.2.1
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  flutter_image_compress: ^2.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.14
  riverpod_lint: ^2.6.5
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  android: true
  ios: true
  web: false
  background_image: assets/background.png
  image: assets/app_icon.png
  branding: assets/brand.png
  android_12:
    color: "#FFFFFF"
    image: assets/app_icon.png
    branding: assets/brand.png
 

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/app_icon.png
    # Images
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/images/illustrations/

    # Animations
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/static/Inter_18pt-Regular.ttf
        - asset: assets/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/static/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/static/Inter_18pt-Black.ttf
          weight: 900
